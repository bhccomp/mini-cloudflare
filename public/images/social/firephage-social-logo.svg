<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="FirePhage social logo">
  <defs>
    <linearGradient id="fp-social-bg" x1="72" y1="48" x2="440" y2="464" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#07111f"/>
      <stop offset="55%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#13233d"/>
    </linearGradient>
    <radialGradient id="fp-social-glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(170 126) rotate(39) scale(338 304)">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity=".34"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="fp-social-shield" x1="132" y1="88" x2="384" y2="396" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#67e8f9"/>
      <stop offset="55%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
