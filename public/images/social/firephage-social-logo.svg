    <path d="M256 322L219 360" stroke="url(#fp-social-core)" stroke-width="11" stroke-linecap="round"/>
    <path d="M256 322L293 360" stroke="url(#fp-social-core)" stroke-width="11" stroke-linecap="round"/>
